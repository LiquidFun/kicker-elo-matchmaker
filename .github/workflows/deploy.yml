name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: kicker
            path: /srv/kicker
            service: kicker
          - name: kicker-public
            path: /srv/kicker-public
            service: kicker-public
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Rsync backend
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          rsync -az --delete \
            --exclude '.venv' --exclude '__pycache__' --exclude '*.db' \
            --exclude '*.db-shm' --exclude '*.db-wal' \
            --exclude 'tests' --exclude 'storage' \
            backend/ "deploy-kicker@$SSH_HOST:${{ matrix.target.path }}/backend/"

      - name: Rsync frontend build
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          rsync -az --delete frontend/dist/ "deploy-kicker@$SSH_HOST:${{ matrix.target.path }}/frontend/dist/"

      - name: Install backend deps and restart service
        env:
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh "deploy-kicker@$SSH_HOST" \
            "cd ${{ matrix.target.path }}/backend && uv sync && sudo systemctl restart ${{ matrix.target.service }}"
